front:
  text: 玉籙大齋第二日晚朝儀
  hash: sha256:770b91c443d55f4645de628db0c299ca1d878e09c2d7840fe136ca43e74ccb3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0206_HFL_000-001a, image: hfl/0269/0269-088.png}
body:
  text: 各禮師存念如法金眞空降神虎檢營玉帝披霞諸天命靈九晨回駕萬魔束形九㣲迅煙神威攝精流金擲火百惡消并神耀輝夜洞杳長春聖道蕩蕩十方肅清保制劫運元亨利貞發爐同旦朝請稱法位具位與臨壇官衆等謹同誠上啓虚无自然元始天尊无極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至眞諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北真玄都玉京金闕七寳瓊臺紫㣲上宫靈寳至真明皇道君三十六部尊經玄中大法師上相上宰上保上傅大平下教二十四眞人西城總眞王君太乙眞人東嶽上卿司命茅君定録保命二眞人名山洞府得道神仙三界官屬一切眞靈臣聞六合隱形潛混中靈之祖炁五陽周緯開明梵寳之天元光耀杳冥芒飛煒燁遐該九極總統三辰啓劫運於上皇應靈圖於太極分洞神之仙境感化生文出神寳之禁書浮空結篆推符曆數載度天民臣等濫綴眞階叨逰祕範汎黄華之妙景凝盻篇章披紫笈之重玄遵依科品凡有所啓敢不上聞齋意青詞謹當宣奏宣詞具如詞言不違懇欵恩惟大道分别哀祈臣聞玉虚玄闕育三光魂魄之精金墝紫清浮九炁隂陽之粹通神入寂招眞致靈臣等恭欵良宵精修妙範蔵雲屏翳泛四景以朗清旋斗歷箕接三光而煥爛寳蓋命群眞之駕玉爐騰九色之烟恭假香傳奉修齋直以今落景行道請法衆等運兹初捻上香願此香烟騰空徑上供養虚无至眞自然大道元始天尊願以是捻香功德上祝當今皇帝聖壽無疆伏願倫序五行氣調六律曰暘曰雨齊七政之璇璣不暑不冰和四時之玉燭順隂陽而合德侔日月以並明世路丕平年登上熟與天同久申命用休今故燒香自皈依道尊大聖衆至眞之德得道之後祈天長存臣聞裁成天地出保家寧國之文化育隂陽立度死濟生之式諸天校録萬聖臨軒以今落景行道請法衆等運兹二捻上香願此香烟騰空徑上供養玉晨至聖自然靈寳大道天尊願以是捻香功德歸流三塗九夜六道四生並願落滅惡根出離苦趣結胎返炁俱昇碧落之鄕易質蛻形盡陟朱陵之界俾死魂而受錬獲仙化以成人報對停休𡨚仇和釋超凌三界逍遥九清今故燒香自皈依經尊大聖衆至眞之德得道之後昇入無形臣聞大道闡於不言故示慈悲之典眞元出於有象乃垂濟度之方今古攸遵人天仰賴以今落景行道請法衆等運兹三捻上香願此香烟騰空徑上供養混元大聖自然化主道德天尊願以是捻香功德上資所薦神靈伏願長謝囂塵永辭色界結胎斬滯含元炁之沖融混化生神畜天眞於玄爽返本𥘉而精練悟我理之兼忌汎景洞空散思霄映逍遥靈駕逰宴上京今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形懴悔三啓三禮重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天真十方師尊聖衆三界官屬一切威靈臣聞六過制魔受伏諾送迎之命三元品戒示蕩形沐浴之科臣等叨濯玄津獲儔靈運所冝服中黄而内養灌溉丹田凝太素以髙觀咀飱玉液蚤佩昇真之籙啓傳破穢之文普度幽沉誓弘清靜况承詞剡恭爲典行今奉某伏爲孤魂滯魄自從宿生今世舉意誤爲動情故犯未能推誠慈順䔍志温良不思三戒之時或專闘氣不顧一朝之忿或致忘身恣凶怒以凌人恃强梁而兼弱心懷嗔性口肆惡聲惟積過以稔非罔修眞而奉戒恐因報對未卜升沉仰祈超濟恭仗修崇非滌故以洗新曷升虚而入妙仰垂惠澤宻注恩波勑九鳳之將軍命五靈之童子招魂將吏解穢官君浣濯夫人黄華玉女諸取太玄神水錬尸素漿甘露金液雲腴玉醴合和眞炁使流注於香湯沐浴塵勞悉蕩除於隂翳魂神澄正性識圓明灌澡五茅整齊八景冠帶簮紱佩服羽儀飛歩九靈出離五濁滅三塗而滌罪宣六腑以生津斷絶地根蕩除尸穢永蠲熱惱普獲清凉易舊更新洗瑕磨垢登質於髙明之境怡神於玄爽之都永謝塵寰俱躋道岸則上明天尊大慈之化下副臣等皈命之誠謹啓以聞十念一念一眞布景二念二象回傾三念三尊鑑映四念四炁調平五念五文煥爛六念六惠齊明七念七辰合瑞八念八卦利貞九念九光旋匝十念魂魄飛升復爐同早朝玉籙大齋第二日晚朝儀
